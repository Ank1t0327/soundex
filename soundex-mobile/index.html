<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Soundex" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Soundex</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    /* ─── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #121212;
      --surface:   #1a1a1a;
      --surface2:  #1e1e1e;
      --border:    #2e2e2e;
      --accent:    #4a90e2;
      --accent-dk: #357abd;
      --orange:    #e67e22;
      --orange-dk: #d35400;
      --red:       #e74c3c;
      --green:     #2ecc71;
      --text:      #ffffff;
      --muted:     #aaaaaa;
      --dim:       #666666;
      --font:      'Courier New', Courier, monospace;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ─── App Shell ─────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* ─── Header ─────────────────────────────────────────────── */
    #header {
      flex-shrink: 0;
      padding: 20px 20px 12px;
      text-align: center;
    }

    #logo {
      font-size: clamp(22px, 7vw, 30px);
      font-weight: bold;
      letter-spacing: 0.35em;
      color: var(--accent);
      user-select: none;
    }

    /* ─── Search ─────────────────────────────────────────────── */
    #search-wrap {
      flex-shrink: 0;
      padding: 0 16px 8px;
      position: relative;
    }

    #search-input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 16px; /* 16px prevents iOS auto-zoom */
      padding: 14px 44px 14px 16px;
      outline: none;
      transition: border-color 0.2s;
      caret-color: var(--accent);
    }
    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--dim); }

    #clear-btn {
      position: absolute;
      right: 28px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 6px;
      display: none;
      line-height: 1;
    }
    #clear-btn.visible { display: block; }

    /* ─── Spinner ────────────────────────────────────────────── */
    #status {
      flex-shrink: 0;
      text-align: center;
      font-size: 11px;
      color: var(--dim);
      min-height: 18px;
      padding: 0 16px 4px;
      transition: color 0.2s;
    }

    /* ─── Suggestions ────────────────────────────────────────── */
    #suggestions {
      flex-shrink: 0;
      margin: 0 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: none;
      max-height: 220px;
      overflow-y: auto;
    }
    #suggestions.visible { display: block; }

    .suggestion-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--text);
      transition: background 0.15s, color 0.15s;
      -webkit-user-select: none;
      user-select: none;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:active, .suggestion-item.selected {
      background: var(--accent);
      color: var(--bg);
    }
    .suggestion-year {
      color: var(--muted);
      font-size: 11px;
      margin-left: 6px;
    }
    .suggestion-item:active .suggestion-year,
    .suggestion-item.selected .suggestion-year { color: var(--bg); }

    /* ─── Scrollable Middle ──────────────────────────────────── */
    #scroll-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 16px;
    }

    /* ─── Preview Card ───────────────────────────────────────── */
    #preview {
      display: none;
      margin-top: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    #preview.visible { display: block; }

    #preview-top {
      display: flex;
      gap: 14px;
      padding: 16px;
    }

    #poster {
      width: 80px;
      height: 118px;
      object-fit: cover;
      border-radius: 8px;
      background: var(--surface2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--dim);
      font-size: 28px;
    }
    #poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }

    #preview-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #preview-title {
      font-size: 15px;
      font-weight: bold;
      color: var(--text);
      line-height: 1.3;
    }

    #preview-cast {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }

    /* TV controls */
    #tv-controls {
      display: none;
      padding: 0 16px 12px;
      gap: 16px;
      align-items: center;
    }
    #tv-controls.visible { display: flex; }

    .tv-label {
      font-size: 11px;
      color: var(--muted);
      margin-right: 6px;
    }

    .ep-input {
      width: 44px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 6px 8px;
      outline: none;
      text-align: center;
    }
    .ep-input:focus { border-color: var(--accent); }

    /* ─── Action Buttons ─────────────────────────────────────── */
    #actions {
      display: none;
      padding: 0 16px 16px;
      gap: 10px;
    }
    #actions.visible { display: flex; }

    .action-btn {
      flex: 1;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 12px;
      font-weight: bold;
      padding: 12px 8px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
    }
    .action-btn:active {
      opacity: 0.75;
      transform: scale(0.96);
    }

    #btn-play    { background: var(--accent);  color: var(--bg); }
    #btn-trailer { background: #444;            color: var(--text); }
    #btn-later   { background: var(--orange);   color: var(--text); }

    /* ─── Bottom Nav ─────────────────────────────────────────── */
    #bottom-nav {
      flex-shrink: 0;
      display: flex;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding-bottom: var(--safe-bottom);
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 8px;
      cursor: pointer;
      color: var(--muted);
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 0.05em;
      transition: color 0.15s;
      -webkit-user-select: none;
      user-select: none;
    }
    .nav-btn:active { color: var(--accent); }
    .nav-icon { font-size: 18px; }

    /* ─── Sheet overlay (History / Watchlist) ────────────────── */
    #sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    #sheet-overlay.visible { display: block; }

    #sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      max-height: 75dvh;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 101;
      padding-bottom: var(--safe-bottom);
      transform: translateX(-50%) translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    #sheet.open {
      transform: translateX(-50%) translateY(0);
    }

    #sheet-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }

    #sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    #sheet-title {
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 0.1em;
      color: var(--accent);
    }

    #sheet-clear {
      font-family: var(--font);
      font-size: 10px;
      color: var(--red);
      background: none;
      border: 1px solid var(--red);
      border-radius: 5px;
      padding: 4px 8px;
      cursor: pointer;
      display: none;
    }
    #sheet-clear.visible { display: block; }

    #sheet-list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px 0;
    }

    .sheet-item {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .sheet-item:last-child { border-bottom: none; }
    .sheet-item:active { background: rgba(74,144,226,0.1); }

    .sheet-item-info {
      flex: 1;
      min-width: 0;
    }
    .sheet-item-title {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sheet-item-year {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    .sheet-item-rm {
      color: var(--red);
      font-size: 14px;
      font-weight: bold;
      padding: 6px;
      flex-shrink: 0;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    #sheet-empty {
      text-align: center;
      color: var(--dim);
      font-size: 12px;
      padding: 40px 20px;
      display: none;
    }
    #sheet-empty.visible { display: block; }

    /* ─── Install Banner ─────────────────────────────────────── */
    #install-banner {
      display: none;
      position: fixed;
      bottom: calc(56px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 448px;
      background: var(--accent);
      color: var(--bg);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.05em;
      z-index: 50;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #install-banner.show { opacity: 1; }
    #install-banner span { flex: 1; }
    #install-btn {
      background: var(--bg);
      color: var(--accent);
      border: none;
      border-radius: 7px;
      font-family: var(--font);
      font-size: 11px;
      font-weight: bold;
      padding: 6px 12px;
      cursor: pointer;
    }
    #install-dismiss {
      background: none;
      border: none;
      color: var(--bg);
      font-size: 18px;
      cursor: pointer;
      padding: 0 0 0 4px;
      line-height: 1;
    }

    /* ─── Scrollbar ──────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ─── Reduced Motion ─────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- Header -->
  <div id="header">
    <div id="logo">S O U N D E X</div>
  </div>

  <!-- Search -->
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="Search movies & TV shows..." autocomplete="off" autocorrect="off" spellcheck="false" />
    <button id="clear-btn" aria-label="Clear search">✕</button>
  </div>

  <!-- Status -->
  <div id="status">Ready.</div>

  <!-- Suggestions -->
  <div id="suggestions" role="listbox" aria-label="Search suggestions"></div>

  <!-- Scrollable body -->
  <div id="scroll-body">

    <!-- Preview Card -->
    <div id="preview">
      <div id="preview-top">
        <div id="poster">🎬</div>
        <div id="preview-info">
          <div id="preview-title"></div>
          <div id="preview-cast"></div>
        </div>
      </div>
      <!-- TV Controls -->
      <div id="tv-controls">
        <span class="tv-label">Season</span>
        <input class="ep-input" id="season-input" type="number" value="1" min="1" inputmode="numeric" />
        <span class="tv-label" style="margin-left:8px">Episode</span>
        <input class="ep-input" id="episode-input" type="number" value="1" min="1" inputmode="numeric" />
      </div>
      <!-- Action Buttons -->
      <div id="actions">
        <button class="action-btn" id="btn-play">▶ PLAY</button>
        <button class="action-btn" id="btn-trailer">TRAILER</button>
        <button class="action-btn" id="btn-later">[+] LATER</button>
      </div>
    </div>

  </div><!-- /scroll-body -->

  <!-- Bottom Nav -->
  <div id="bottom-nav">
    <div class="nav-btn" id="nav-watchlist">
      <span class="nav-icon">★</span>
      <span>WATCH LIST</span>
    </div>
    <div class="nav-btn" id="nav-history">
      <span class="nav-icon">🕒</span>
      <span>HISTORY</span>
    </div>
  </div>

</div><!-- /app -->

<!-- Sheet Overlay -->
<div id="sheet-overlay"></div>
<div id="sheet" role="dialog" aria-modal="true">
  <div id="sheet-handle"></div>
  <div id="sheet-header">
    <div id="sheet-title">WATCH LIST</div>
    <button id="sheet-clear">CLEAR ALL</button>
  </div>
  <div id="sheet-empty">This list is empty.</div>
  <div id="sheet-list"></div>
</div>

<!-- Install Banner -->
<div id="install-banner">
  <span>Add Soundex to your home screen</span>
  <button id="install-btn">INSTALL</button>
  <button id="install-dismiss">✕</button>
</div>

<script>
// ─── Storage ───────────────────────────────────────────────────────────────
const STORE_DIR = 'soundex';
const load = (key) => {
  try { return JSON.parse(localStorage.getItem(`${STORE_DIR}:${key}`) || 'null') || []; }
  catch { return []; }
};
const save = (key, val) => {
  try { localStorage.setItem(`${STORE_DIR}:${key}`, JSON.stringify(val)); } catch {}
};

let historyData   = load('history');
let watchlistData = load('watchlist');

// ─── State ─────────────────────────────────────────────────────────────────
let currentSelection = null;
let suggestions      = [];
let debounceTimer    = null;
let spinnerInterval  = null;
let spinnerIdx       = 0;
const spinnerFrames  = ['⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏'];

// ─── DOM refs ──────────────────────────────────────────────────────────────
const searchInput  = document.getElementById('search-input');
const clearBtn     = document.getElementById('clear-btn');
const statusEl     = document.getElementById('status');
const suggestEl    = document.getElementById('suggestions');
const previewEl    = document.getElementById('preview');
const posterEl     = document.getElementById('poster');
const titleEl      = document.getElementById('preview-title');
const castEl       = document.getElementById('preview-cast');
const tvControls   = document.getElementById('tv-controls');
const seasonInput  = document.getElementById('season-input');
const episodeInput = document.getElementById('episode-input');
const actionsEl    = document.getElementById('actions');
const btnPlay      = document.getElementById('btn-play');
const btnTrailer   = document.getElementById('btn-trailer');
const btnLater     = document.getElementById('btn-later');

const overlay      = document.getElementById('sheet-overlay');
const sheet        = document.getElementById('sheet');
const sheetTitle   = document.getElementById('sheet-title');
const sheetClear   = document.getElementById('sheet-clear');
const sheetList    = document.getElementById('sheet-list');
const sheetEmpty   = document.getElementById('sheet-empty');

const installBanner = document.getElementById('install-banner');
const installBtn    = document.getElementById('install-btn');
const installDismiss= document.getElementById('install-dismiss');

// ─── Status ────────────────────────────────────────────────────────────────
function setStatus(text, color = 'var(--dim)') {
  statusEl.textContent = text;
  statusEl.style.color = color;
}

function startSpinner() {
  if (spinnerInterval) return;
  spinnerInterval = setInterval(() => {
    spinnerIdx = (spinnerIdx + 1) % spinnerFrames.length;
    setStatus(`Searching ${spinnerFrames[spinnerIdx]}`, 'var(--accent)');
  }, 100);
}

function stopSpinner() {
  if (spinnerInterval) { clearInterval(spinnerInterval); spinnerInterval = null; }
}

// ─── Search ────────────────────────────────────────────────────────────────
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  clearBtn.classList.toggle('visible', q.length > 0);
  clearDebounce();
  debounceTimer = setTimeout(fetchSuggestions, 300);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); handleEnter(); }
  if (e.key === 'Escape') { hideSuggestions(); searchInput.blur(); }
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.classList.remove('visible');
  hideSuggestions();
  hidePreview();
  setStatus('Ready.');
  currentSelection = null;
  searchInput.focus();
});

function clearDebounce() {
  if (debounceTimer) { clearTimeout(debounceTimer); debounceTimer = null; }
}

function handleEnter() {
  if (suggestions.length > 0) {
    selectSuggestion(suggestions[0]);
  } else if (currentSelection) {
    playMedia();
  }
}

async function fetchSuggestions() {
  const raw = searchInput.value.trim();
  if (!raw || raw.length < 2) {
    hideSuggestions(); hidePreview(); stopSpinner(); setStatus('Ready.'); return;
  }

  startSpinner();
  const clean = raw.toLowerCase().replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
  if (!clean) { stopSpinner(); return; }

  const first = clean[0];
  const url   = `https://v2.sg.media-imdb.com/suggestion/${first}/${encodeURIComponent(clean)}.json`;

  try {
    const res  = await fetch(url);
    const data = await res.json();
    const results = [];

    if (data.d) {
      for (const item of data.d) {
        if (item.id && item.id.startsWith('tt')) {
          results.push({
            id:   item.id,
            t:    item.l || 'Unknown',
            y:    String(item.y || ''),
            s:    item.s || '',
            type: item.qid || 'movie',
            img:  item.i?.imageUrl || ''
          });
        }
      }
    }

    stopSpinner();
    showSuggestions(results);
  } catch {
    stopSpinner();
    setStatus('Connection error.', 'var(--red)');
  }
}

function showSuggestions(results) {
  suggestions = results;
  suggestEl.innerHTML = '';

  if (results.length === 0) {
    hideSuggestions();
    setStatus('No matches found.', 'var(--red)');
    return;
  }

  results.forEach((r, i) => {
    const el = document.createElement('div');
    el.className = 'suggestion-item';
    el.setAttribute('role', 'option');
    el.innerHTML = `<span>${escHtml(r.t)}</span>${r.y ? `<span class="suggestion-year">(${r.y})</span>` : ''}`;
    el.addEventListener('click', () => selectSuggestion(r));
    // Touch feedback
    el.addEventListener('touchstart', () => el.classList.add('selected'), { passive: true });
    el.addEventListener('touchend', () => el.classList.remove('selected'), { passive: true });
    suggestEl.appendChild(el);
  });

  suggestEl.classList.add('visible');
  setStatus(`${results.length} match${results.length !== 1 ? 'es' : ''} found.`, 'var(--dim)');
}

function hideSuggestions() {
  suggestEl.classList.remove('visible');
  suggestEl.innerHTML = '';
  suggestions = [];
}

function selectSuggestion(item) {
  currentSelection = item;
  searchInput.value = item.t;
  clearBtn.classList.add('visible');
  hideSuggestions();
  searchInput.blur();
  showPreview(item);
}

// ─── Preview ───────────────────────────────────────────────────────────────
function showPreview(item) {
  const yearStr = item.y ? ` (${item.y})` : '';
  titleEl.textContent = item.t + yearStr;
  castEl.textContent  = item.s;

  // Reset poster
  posterEl.innerHTML = '🎬';
  if (item.img) {
    const proxyUrl = `https://wsrv.nl/?url=${encodeURIComponent(item.img)}&output=jpg&w=160`;
    const img = document.createElement('img');
    img.alt = item.t;
    img.addEventListener('load',  () => { posterEl.innerHTML = ''; posterEl.appendChild(img); });
    img.addEventListener('error', () => { posterEl.innerHTML = '🎬'; });
    img.src = proxyUrl;
  }

  // TV controls
  if (item.type === 'tvSeries') {
    tvControls.classList.add('visible');
    seasonInput.value  = '1';
    episodeInput.value = '1';
  } else {
    tvControls.classList.remove('visible');
  }

  previewEl.classList.add('visible');
  actionsEl.classList.add('visible');
  setStatus('Ready to stream.', 'var(--green)');

  // Scroll preview into view
  setTimeout(() => previewEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

function hidePreview() {
  previewEl.classList.remove('visible');
  actionsEl.classList.remove('visible');
  tvControls.classList.remove('visible');
}

// ─── Browser launcher ──────────────────────────────────────────────────────
// On mobile we can only open URLs — the browser decides kiosk vs not.
// We try to open in a new tab; on iOS Safari PWA it stays in the PWA context.
function openUrl(url) {
  // For standalone PWA, window.open may leave the app. We use location to keep context.
  if (window.matchMedia('(display-mode: standalone)').matches) {
    window.location.href = url;
  } else {
    window.open(url, '_blank', 'noopener');
  }
}

// ─── Actions ───────────────────────────────────────────────────────────────
function playMedia() {
  if (!currentSelection) return;
  const { id, type } = currentSelection;
  let url = `https://www.playimdb.com/title/${id}/`;
  if (type === 'tvSeries') {
    const s = (seasonInput.value.trim()  || '1');
    const e = (episodeInput.value.trim() || '1');
    url += `${s}/${e}/`;
  }

  // Update history
  historyData = historyData.filter(x => x.id !== currentSelection.id);
  historyData.unshift(currentSelection);
  historyData = historyData.slice(0, 20);
  save('history', historyData);

  setStatus('Opening…', 'var(--green)');
  openUrl(url);
}

function playTrailer() {
  if (!currentSelection) return;
  const q   = `${currentSelection.t} ${currentSelection.y} official trailer`;
  const url = `https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`;
  openUrl(url);
}

function addToWatchlist() {
  if (!currentSelection) return;
  if (watchlistData.find(x => x.id === currentSelection.id)) {
    setStatus('Already in Watch List!', 'var(--orange)');
    return;
  }
  watchlistData.unshift(currentSelection);
  save('watchlist', watchlistData);
  setStatus(`'${currentSelection.t}' added to Watch List.`, 'var(--orange)');
  
  // Quick pulse on button
  btnLater.style.transform = 'scale(1.05)';
  setTimeout(() => btnLater.style.transform = '', 200);
}

btnPlay.addEventListener('click',    playMedia);
btnTrailer.addEventListener('click', playTrailer);
btnLater.addEventListener('click',   addToWatchlist);

// ─── Sheet (History / Watchlist) ───────────────────────────────────────────
let currentSheetMode = 'watchlist'; // or 'history'

function openSheet(mode) {
  currentSheetMode = mode;
  const isHistory = mode === 'history';
  const data = isHistory ? historyData : watchlistData;

  sheetTitle.textContent = isHistory ? 'HISTORY' : 'WATCH LIST';
  sheetClear.classList.toggle('visible', isHistory && data.length > 0);
  renderSheetList(data, isHistory);

  overlay.classList.add('visible');
  requestAnimationFrame(() => sheet.classList.add('open'));
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  sheet.classList.remove('open');
  setTimeout(() => {
    overlay.classList.remove('visible');
    document.body.style.overflow = '';
  }, 300);
}

function renderSheetList(data, isHistory) {
  sheetList.innerHTML = '';
  if (data.length === 0) {
    sheetEmpty.classList.add('visible');
    sheetList.style.display = 'none';
    return;
  }
  sheetEmpty.classList.remove('visible');
  sheetList.style.display = '';

  data.forEach(item => {
    const row = document.createElement('div');
    row.className = 'sheet-item';

    const info = document.createElement('div');
    info.className = 'sheet-item-info';
    info.innerHTML = `<div class="sheet-item-title">${escHtml(item.t)}</div><div class="sheet-item-year">${item.y}${item.type === 'tvSeries' ? ' · TV' : ''}</div>`;
    info.addEventListener('click', () => {
      selectSuggestion(item);
      closeSheet();
    });

    const rm = document.createElement('div');
    rm.className = 'sheet-item-rm';
    rm.textContent = '✕';
    rm.addEventListener('click', e => {
      e.stopPropagation();
      removeItem(item.id, isHistory);
    });

    row.appendChild(info);
    row.appendChild(rm);
    sheetList.appendChild(row);
  });
}

function removeItem(id, isHistory) {
  if (isHistory) {
    historyData = historyData.filter(x => x.id !== id);
    save('history', historyData);
    renderSheetList(historyData, true);
    sheetClear.classList.toggle('visible', historyData.length > 0);
  } else {
    watchlistData = watchlistData.filter(x => x.id !== id);
    save('watchlist', watchlistData);
    renderSheetList(watchlistData, false);
  }
}

sheetClear.addEventListener('click', () => {
  historyData = [];
  save('history', historyData);
  renderSheetList(historyData, true);
  sheetClear.classList.remove('visible');
});

overlay.addEventListener('click', closeSheet);

document.getElementById('nav-watchlist').addEventListener('click', () => openSheet('watchlist'));
document.getElementById('nav-history').addEventListener('click',   () => openSheet('history'));

// Swipe-down to close sheet
let touchStartY = 0;
sheet.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
sheet.addEventListener('touchmove',  e => {
  const dy = e.touches[0].clientY - touchStartY;
  if (dy > 80) closeSheet();
}, { passive: true });

// ─── PWA Install ───────────────────────────────────────────────────────────
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show banner after a short delay if not already installed
  if (!window.matchMedia('(display-mode: standalone)').matches) {
    setTimeout(() => {
      installBanner.style.display = 'flex';
      requestAnimationFrame(() => installBanner.classList.add('show'));
    }, 3000);
  }
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBanner.classList.remove('show');
  setTimeout(() => installBanner.style.display = 'none', 300);
});

installDismiss.addEventListener('click', () => {
  installBanner.classList.remove('show');
  setTimeout(() => installBanner.style.display = 'none', 300);
});

// ─── Service Worker ────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// ─── Helpers ───────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
